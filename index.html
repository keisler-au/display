<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Quiz</title>
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --text: #1f2933;
    --muted: #6b7280;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --correct: #16a34a;
    --correct-bg: #dcfce7;
    --wrong: #dc2626;
    --wrong-bg: #fee2e2;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    padding: 20px;
  }
  .card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 480px;
    padding: 32px;
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 14px;
    color: var(--muted);
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .progress-fill {
    height: 100%;
    background: var(--primary);
    transition: width 0.3s ease;
  }
  .lang-tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--primary);
    background: #eff6ff;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 14px;
  }
  .prompt-word {
    font-size: 30px;
    font-weight: 700;
    margin: 0 0 28px 0;
    word-break: break-word;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option-btn {
    padding: 14px 16px;
    font-size: 16px;
    border: 2px solid var(--border);
    background: var(--card);
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s ease, background 0.15s ease;
    color: var(--text);
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--primary);
  }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
    font-weight: 600;
  }
  .option-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: var(--wrong);
    font-weight: 600;
  }
  .text-input-row {
    display: flex;
    gap: 10px;
  }
  input[type="text"] {
    flex: 1;
    padding: 14px 16px;
    font-size: 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    outline: none;
  }
  input[type="text"]:focus { border-color: var(--primary); }
  input[type="text"].correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); }
  input[type="text"].wrong { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); }
  button.action {
    padding: 14px 20px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    cursor: pointer;
  }
  button.action:hover { background: var(--primary-dark); }
  button.action:disabled { background: var(--border); cursor: default; }
  .feedback {
    margin-top: 16px;
    font-size: 15px;
    min-height: 22px;
  }
  .feedback.correct-text { color: var(--correct); }
  .feedback.wrong-text { color: var(--wrong); }
  .next-row {
    margin-top: 20px;
    display: flex;
    justify-content: flex-end;
  }
  .end-screen { text-align: center; }
  .end-score {
    font-size: 48px;
    font-weight: 800;
    color: var(--primary);
    margin: 10px 0;
  }
  .end-sub { color: var(--muted); margin-bottom: 24px; }
  .restart-btn {
    padding: 14px 28px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    cursor: pointer;
  }
  .restart-btn:hover { background: var(--primary-dark); }
</style>
</head>
<body>

<div class="card" id="app"></div>

<script>
/* ============================================================
   YOUR WORD LIST
   Replace the contents of this array with your own words.
   Format: { en: "english word", nl: "dutch translation" }
   You can rename the keys (e.g. "fr" for French) as long as
   you also update LANG_A_KEY / LANG_B_KEY / LANG_A_LABEL /
   LANG_B_LABEL below to match.
   ============================================================ */
const words = [
  { en: "house", nl: "huis" },
  { en: "dog", nl: "hond" },
  { en: "cat", nl: "kat" },
  { en: "water", nl: "water" },
  { en: "bread", nl: "brood" },
  { en: "book", nl: "boek" },
  { en: "friend", nl: "vriend" },
  { en: "to eat", nl: "eten" },
  { en: "to drink", nl: "drinken" },
  { en: "beautiful", nl: "mooi" },
  { en: "fast", nl: "snel" },
  { en: "slow", nl: "langzaam" },
  { en: "morning", nl: "ochtend" },
  { en: "evening", nl: "avond" },
  { en: "to work", nl: "werken" }
];

const LANG_A_KEY = "en";
const LANG_B_KEY = "nl";
const LANG_A_LABEL = "English";
const LANG_B_LABEL = "Dutch";

/* ============================================================
   APP LOGIC
   ============================================================ */

let questions = [];
let currentIndex = 0;
let score = 0;
let answered = false;

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildQuestions() {
  const shuffledWords = shuffle(words);
  return shuffledWords.map((pair) => {
    const type = Math.random() < 0.5 ? "mc" : "text";
    const direction = Math.random() < 0.5 ? "a-to-b" : "b-to-a";

    const promptKey = direction === "a-to-b" ? LANG_A_KEY : LANG_B_KEY;
    const answerKey = direction === "a-to-b" ? LANG_B_KEY : LANG_A_KEY;
    const promptLabel = direction === "a-to-b" ? LANG_A_LABEL : LANG_B_LABEL;
    const answerLabel = direction === "a-to-b" ? LANG_B_LABEL : LANG_A_LABEL;

    const question = {
      pair,
      type,
      direction,
      promptWord: pair[promptKey],
      correctAnswer: pair[answerKey],
      promptLabel,
      answerLabel,
      answerKey
    };

    if (type === "mc") {
      const distractorPool = words
        .filter((w) => w !== pair)
        .map((w) => w[answerKey])
        .filter((val) => val !== question.correctAnswer);
      const distractors = shuffle([...new Set(distractorPool)]).slice(0, 3);
      question.options = shuffle([question.correctAnswer, ...distractors]);
    }

    return question;
  });
}

function startQuiz() {
  questions = buildQuestions();
  currentIndex = 0;
  score = 0;
  answered = false;
  renderQuestion();
}

function renderQuestion() {
  const app = document.getElementById("app");
  const q = questions[currentIndex];
  answered = false;

  const progressPct = Math.round((currentIndex / questions.length) * 100);

  let optionsHtml = "";
  if (q.type === "mc") {
    optionsHtml = `<div class="options">` +
      q.options.map((opt, i) =>
        `<button class="option-btn" data-value="${escapeHtml(opt)}" onclick="handleMcAnswer(this, '${escapeAttr(opt)}')">${escapeHtml(opt)}</button>`
      ).join("") +
      `</div>`;
  } else {
    optionsHtml = `
      <div class="text-input-row">
        <input type="text" id="textAnswer" autocomplete="off" placeholder="Type the ${q.answerLabel} translation" onkeydown="if(event.key==='Enter') handleTextAnswer()">
        <button class="action" onclick="handleTextAnswer()">Check</button>
      </div>`;
  }

  app.innerHTML = `
    <div class="top-row">
      <span>Question ${currentIndex + 1} / ${questions.length}</span>
      <span>Score: ${score}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    <span class="lang-tag">${q.promptLabel} → ${q.answerLabel}</span>
    <p class="prompt-word">${escapeHtml(q.promptWord)}</p>
    ${optionsHtml}
    <div class="feedback" id="feedback"></div>
    <div class="next-row">
      <button class="action" id="nextBtn" onclick="nextQuestion()" disabled>Next</button>
    </div>
  `;

  if (q.type === "text") {
    document.getElementById("textAnswer").focus();
  }
}

function normalize(str) {
  return str.trim().toLowerCase();
}

function handleMcAnswer(btn, chosen) {
  if (answered) return;
  answered = true;
  const q = questions[currentIndex];
  const buttons = document.querySelectorAll(".option-btn");
  const isCorrect = normalize(chosen) === normalize(q.correctAnswer);

  buttons.forEach((b) => {
    b.disabled = true;
    if (normalize(b.dataset.value) === normalize(q.correctAnswer)) {
      b.classList.add("correct");
    } else if (b === btn && !isCorrect) {
      b.classList.add("wrong");
    }
  });

  showFeedback(isCorrect, q.correctAnswer);
}

function handleTextAnswer() {
  if (answered) return;
  answered = true;
  const q = questions[currentIndex];
  const input = document.getElementById("textAnswer");
  const value = input.value;
  const isCorrect = normalize(value) === normalize(q.correctAnswer);

  input.disabled = true;
  input.classList.add(isCorrect ? "correct" : "wrong");

  showFeedback(isCorrect, q.correctAnswer);
}

function showFeedback(isCorrect, correctAnswer) {
  if (isCorrect) score++;
  const feedback = document.getElementById("feedback");
  feedback.textContent = isCorrect
    ? "Correct!"
    : `Not quite. Correct answer: ${correctAnswer}`;
  feedback.className = "feedback " + (isCorrect ? "correct-text" : "wrong-text");
  document.getElementById("nextBtn").disabled = false;
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) {
    renderEndScreen();
  } else {
    renderQuestion();
  }
}

function renderEndScreen() {
  const app = document.getElementById("app");
  const pct = Math.round((score / questions.length) * 100);
  app.innerHTML = `
    <div class="end-screen">
      <p class="lang-tag">Quiz complete</p>
      <div class="end-score">${score} / ${questions.length}</div>
      <p class="end-sub">${pct}% correct</p>
      <button class="restart-btn" onclick="startQuiz()">Try again</button>
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str) {
  return String(str).replace(/'/g, "\\'");
}

startQuiz();
</script>
</body>
</html>
