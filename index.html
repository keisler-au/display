<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Hub</title>
<style>
  /*
    Just edit the two href values below to match your actual filenames:
    - PRINCE2 link currently points to "index.html" (this project's quiz file)
    - Dutch link currently points to "dutch.html" — change to whatever
      your Dutch vocab page is actually called.
  */
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#F3EFE6;
    font-family:sans-serif;
  }
  .buttons{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    justify-content:center;
  }
  a.tile{
    display:block;
    width:220px;
    padding:40px 20px;
    text-align:center;
    text-decoration:none;
    color:#1B2432;
    background:#FBF9F3;
    border:1px solid #C9C1AE;
    border-radius:4px;
    font-size:1.1rem;
    font-weight:600;
    transition:transform .12s ease, border-color .12s ease;
  }
  a.tile:hover{
    border-color:#1B2432;
    transform:translateY(-2px);
  }
</style>
</head>
<body>
  <div class="buttons">
    <a class="tile" href="/prince/">PRINCE2</a>
    <a class="tile" href="/nederlands/">Nederlands</a>
  </div>
</body>
</html>
