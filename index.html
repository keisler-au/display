<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vocabulary Quiz</title>
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --text: #1f2933;
    --muted: #6b7280;
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --correct: #16a34a;
    --correct-bg: #dcfce7;
    --wrong: #dc2626;
    --wrong-bg: #fee2e2;
    --border: #e5e7eb;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    padding: 20px;
  }
  .card {
    background: var(--card);
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 480px;
    padding: 32px;
  }
  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 14px;
    color: var(--muted);
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .progress-fill {
    height: 100%;
    background: var(--primary);
    transition: width 0.3s ease;
  }
  .lang-tag {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--primary);
    background: #eff6ff;
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 14px;
  }
  .prompt-block {
    margin-bottom: 28px;
  }
  .prompt-word {
    font-size: 30px;
    font-weight: 700;
    margin: 0;
    word-break: break-word;
  }
  .prompt-hint {
    font-size: 14px;
    color: var(--muted);
    font-style: italic;
    margin: 4px 0 0 0;
  }
  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .option-btn {
    padding: 14px 16px;
    font-size: 16px;
    border: 2px solid var(--border);
    background: var(--card);
    border-radius: 10px;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s ease, background 0.15s ease;
    color: var(--text);
    touch-action: manipulation;
  }
  .option-btn:hover:not(:disabled) {
    border-color: var(--primary);
  }
  .option-btn:disabled { cursor: default; }
  .option-btn.correct {
    border-color: var(--correct);
    background: var(--correct-bg);
    color: var(--correct);
    font-weight: 600;
  }
  
  .option-btn.wrong {
    border-color: var(--wrong);
    background: var(--wrong-bg);
    color: var(--wrong);
    font-weight: 600;
  }
  .text-input-row {
    display: flex;
    gap: 10px;
  }
  input[type="text"] {
    flex: 1;
    padding: 14px 16px;
    font-size: 16px;
    border: 2px solid var(--border);
    border-radius: 10px;
    outline: none;
    touch-action: manipulation;
  }
  input[type="text"]:focus { border-color: var(--primary); }
  input[type="text"].correct { border-color: var(--correct); background: var(--correct-bg); color: var(--correct); }
  input[type="text"].wrong { border-color: var(--wrong); background: var(--wrong-bg); color: var(--wrong); }
  button.action {
    padding: 14px 20px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    cursor: pointer;
    touch-action: manipulation;
  }
  button.action:hover:not(:disabled) { background: var(--primary-dark); }
  button.action:disabled { background: var(--border); cursor: default; }
  .feedback {
    margin-top: 16px;
    font-size: 15px;
    min-height: 22px;
  }
  .feedback.correct-text { color: var(--correct); }
  .feedback.wrong-text { color: var(--wrong); }
  .next-row {
    margin-top: 20px;
    display: flex;
    justify-content: flex-end;
  }
  .end-screen { text-align: center; }
  .end-score {
    font-size: 48px;
    font-weight: 800;
    color: var(--primary);
    margin: 10px 0;
  }
  .end-sub { color: var(--muted); margin-bottom: 24px; }
  .restart-btn {
    padding: 14px 28px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    background: var(--primary);
    color: white;
    cursor: pointer;
  }
  .restart-btn:hover { background: var(--primary-dark); }
  .secondary-btn {
    padding: 14px 28px;
    font-size: 15px;
    font-weight: 600;
    border: 2px solid var(--border);
    border-radius: 10px;
    background: var(--card);
    color: var(--text);
    cursor: pointer;
    margin-top: 10px;
  }
  .secondary-btn:hover { border-color: var(--primary); color: var(--primary); }

  .mode-select h1 {
    font-size: 22px;
    margin: 0 0 6px 0;
  }
  .mode-select p.sub {
    color: var(--muted);
    margin: 0 0 24px 0;
    font-size: 14px;
  }
  .mode-btn {
    display: block;
    width: 100%;
    text-align: left;
    padding: 16px 18px;
    border: 2px solid var(--border);
    background: var(--card);
    border-radius: 12px;
    cursor: pointer;
    margin-bottom: 12px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .mode-btn:hover { border-color: var(--primary); background: #eff6ff; }
  .mode-btn .mode-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    margin: 0 0 2px 0;
  }
  .mode-btn .mode-desc {
    font-size: 13px;
    color: var(--muted);
    margin: 0;
  }

  /* Verb conjugation mode */
  .verb-fields {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .verb-field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  .verb-field .correct-hint {
    font-size: 13px;
    margin-top: 4px;
    color: var(--wrong);
  }
  .verb-summary {
    margin-top: 10px;
    font-size: 15px;
    padding: 12px 14px;
    border-radius: 10px;
    background: var(--bg);
  }

  @media (max-width: 480px) {
    body {
      padding: 0;
      align-items: stretch;
    }
    .card {
      border-radius: 0;
      box-shadow: none;
      max-width: none;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 20px 18px;
      padding-top: max(20px, env(safe-area-inset-top));
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
    }
    .top-row { font-size: 13px; }
    .prompt-word { font-size: 26px; }
    .option-btn { padding: 16px; font-size: 16px; }
    .text-input-row {
      flex-direction: column;
    }
    input[type="text"] {
      width: 100%;
      font-size: 16px;
    }
    .next-row {
      justify-content: stretch;
    }
    .next-row button.action {
      width: 100%;
    }
    .end-score { font-size: 40px; }
    .restart-btn { width: 100%; }
    .secondary-btn { width: 100%; }
  }
</style>
</head>

const QUESTIONS_PER_SET = 15;

let currentMode = "mixed";
let questions = [];
let currentIndex = 0;
let score = 0;
let setScore = 0;
let answered = false;

// Running totals used to compute accuracy, and a "snapshot" that only
// gets refreshed at the end of each 15-question block, so the accuracy
// shown during a block reflects the last completed block, not the
// in-progress one.
let totalAnswered = 0;
let totalCorrect = 0;
let displayedAccuracy = null;

function snapshotAccuracy() {
  displayedAccuracy = totalAnswered > 0 ? Math.round((totalCorrect / totalAnswered) * 100) : null;
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Splits a word like "rather (quite)" into { base: "rather", hint: "quite" }.
// Hints are for on-screen context only and are never part of a correct answer.
function parseWord(str) {
  const match = str.match(/^(.*?)\s*\(([^)]*)\)\s*$/);
  if (match) {
    return { base: match[1].trim(), hint: match[2].trim() };
  }
  return { base: str.trim(), hint: null };
}

function buildQuestions(mode) {
  const shuffledWords = shuffle(words);
  return shuffledWords.map((pair) => {
    let type;
    let direction;

    if (mode === "mc") {
      type = "mc";
      direction = Math.random() < 0.5 ? "a-to-b" : "b-to-a";
    } else if (mode === "a-to-b") {
      type = "text";
      direction = "a-to-b";
    } else if (mode === "b-to-a") {
      type = "text";
      direction = "b-to-a";
    } else {
      // mixed: random type and random direction, independently per word
      type = Math.random() < 0.35 ? "mc" : "text";
      direction = Math.random() < 0.5 ? "a-to-b" : "b-to-a";
    }

    const promptKey = direction === "a-to-b" ? LANG_A_KEY : LANG_B_KEY;
    const answerKey = direction === "a-to-b" ? LANG_B_KEY : LANG_A_KEY;
    const promptLabel = direction === "a-to-b" ? LANG_A_LABEL : LANG_B_LABEL;
    const answerLabel = direction === "a-to-b" ? LANG_B_LABEL : LANG_A_LABEL;

    const promptParsed = parseWord(pair[promptKey]);
    const answerParsed = parseWord(pair[answerKey]);

    const question = {
      pair,
      type,
      direction,
      promptWord: promptParsed.base,
      promptHint: promptParsed.hint,
      correctAnswer: answerParsed.base,
      promptLabel,
      answerLabel,
      answerKey
    };

    if (type === "mc") {
      const distractorPool = words
        .filter((w) => w !== pair)
        .map((w) => parseWord(w[answerKey]).base)
        .filter((val) => val !== question.correctAnswer);
      const distractors = shuffle([...new Set(distractorPool)]).slice(0, 3);
      question.options = shuffle([question.correctAnswer, ...distractors]);
    }

    return question;
  });
}

// Verb-mode questions are simpler: one entry per verb, each requiring
// four typed fields (infinitive, past singular, past plural, perfect).
function buildVerbQuestions() {
  return shuffle(verbs).map((v) => ({
    verb: v,
    fields: [
      { key: "infinitive", label: "Infinitive", value: v.infinitive },
      { key: "pastSingular", label: "Past tense (ik / jij / hij)", value: v.pastSingular },
      { key: "pastPlural", label: "Past tense (wij / jullie / zij)", value: v.pastPlural },
      { key: "perfect", label: "Perfect tense (heeft/is + participle)", value: v.perfect }
    ]
  }));
}

function renderModeSelect() {
  const app = document.getElementById("app");
  app.innerHTML = `
    <div class="mode-select">
      <h1>Vocabulary Quiz</h1>
      <p class="sub">Choose how you'd like to practice:</p>
      ${Object.entries(MODES).map(([key, m]) => `
        <button class="mode-btn" onclick="startQuiz('${key}')">
          <p class="mode-title">${escapeHtml(m.title)}</p>
          <p class="mode-desc">${escapeHtml(m.desc)}</p>
        </button>
      `).join("")}
    </div>
  `;
}

function startQuiz(mode) {
  currentMode = mode || currentMode;
  questions = currentMode === "verbs" ? buildVerbQuestions() : buildQuestions(currentMode);
  currentIndex = 0;
  score = 0;
  setScore = 0;
  answered = false;
  totalAnswered = 0;
  totalCorrect = 0;
  displayedAccuracy = null;
  renderQuestion();
}

function renderQuestion() {
  if (currentMode === "verbs") {
    renderVerbQuestion();
    return;
  }

  const app = document.getElementById("app");
  const q = questions[currentIndex];
  answered = false;

  const totalSets = Math.ceil(questions.length / QUESTIONS_PER_SET);
  const setNumber = Math.floor(currentIndex / QUESTIONS_PER_SET) + 1;
  const setStart = (setNumber - 1) * QUESTIONS_PER_SET;
  const setLength = Math.min(QUESTIONS_PER_SET, questions.length - setStart);
  const posInSet = currentIndex - setStart + 1;
  const progressPct = Math.round((posInSet - 1) / setLength * 100);

  let optionsHtml = "";
  if (q.type === "mc") {
    optionsHtml = `<div class="options">` +
      q.options.map((opt, i) =>
        `<button class="option-btn" data-value="${escapeHtml(opt)}" onclick="handleMcAnswer(this, '${escapeAttr(opt)}')">${escapeHtml(opt)}</button>`
      ).join("") +
      `</div>`;
  } else {
    optionsHtml = `
      <div class="text-input-row">
        <input type="text" id="textAnswer" autocomplete="off" placeholder="Type the ${q.answerLabel} translation">
      </div>`;
  }

  app.innerHTML = `
    <div class="top-row">
      <span>Set ${setNumber} / ${totalSets} — Question ${posInSet} / ${setLength}</span>
      <span>${displayedAccuracy !== null ? `Accuracy: ${displayedAccuracy}%` : ""}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    <span class="lang-tag">${q.promptLabel} → ${q.answerLabel}</span>
    <div class="prompt-block">
      <p class="prompt-word">${escapeHtml(q.promptWord)}</p>
      ${q.promptHint ? `<p class="prompt-hint">(${escapeHtml(q.promptHint)})</p>` : ""}
    </div>
    ${optionsHtml}
    <div class="feedback" id="feedback"></div>
    <div class="next-row">
      <button class="action" id="actionBtn" onclick="handleActionButton()" ${q.type === "mc" ? "disabled" : ""}>${q.type === "mc" ? "Next" : "Check"}</button>
    </div>
  `;

  if (q.type === "text") {
    document.getElementById("textAnswer").focus();
  }
}

function renderVerbQuestion() {
  const app = document.getElementById("app");
  const q = questions[currentIndex];
  answered = false;

  const totalSets = Math.ceil(questions.length / QUESTIONS_PER_SET);
  const setNumber = Math.floor(currentIndex / QUESTIONS_PER_SET) + 1;
  const setStart = (setNumber - 1) * QUESTIONS_PER_SET;
  const setLength = Math.min(QUESTIONS_PER_SET, questions.length - setStart);
  const posInSet = currentIndex - setStart + 1;
  const progressPct = Math.round((posInSet - 1) / setLength * 100);

  const fieldsHtml = q.fields.map((f, i) => `
    <div class="verb-field">
      <label for="verbField${i}">${escapeHtml(f.label)}</label>
      <input type="text" id="verbField${i}" data-key="${f.key}" autocomplete="off" placeholder="…">
      <div class="correct-hint" id="verbHint${i}"></div>
    </div>
  `).join("");

  app.innerHTML = `
    <div class="top-row">
      <span>Set ${setNumber} / ${totalSets} — Question ${posInSet} / ${setLength}</span>
      <span>${displayedAccuracy !== null ? `Accuracy: ${displayedAccuracy}%` : ""}</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${progressPct}%"></div></div>
    <span class="lang-tag">${q.verb.type === "irregular" ? "Irregular verb" : "Regular verb"}</span>
    <div class="prompt-block">
      <p class="prompt-word">${escapeHtml(q.verb.en)}</p>
    </div>
    <div class="verb-fields">
      ${fieldsHtml}
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="next-row">
      <button class="action" id="actionBtn" onclick="handleActionButton()">Check</button>
    </div>
  `;

  document.getElementById("verbField0").focus();
}

function normalize(str) {
  return str.trim().toLowerCase().replace(/\s+/g, " ");
}

// Single button drives both "check" and "next": before an answer is
// given it checks (text questions only — multiple choice checks itself
// when an option is clicked); after an answer is given it advances.
function handleActionButton() {
  const q = questions[currentIndex];
  if (!q) return;
  if (currentMode === "verbs") {
    if (!answered) {
      handleVerbCheck();
    } else {
      nextQuestion();
    }
    return;
  }
  if (!answered) {
    if (q.type === "text") {
      handleTextAnswer();
    }
  } else {
    nextQuestion();
  }
}

function handleMcAnswer(btn, chosen) {
  if (answered) return;
  answered = true;
  const q = questions[currentIndex];
  const buttons = document.querySelectorAll(".option-btn");
  const isCorrect = normalize(chosen) === normalize(q.correctAnswer);

  buttons.forEach((b) => {
    b.disabled = true;
    if (normalize(b.dataset.value) === normalize(q.correctAnswer)) {
      b.classList.add("correct");
    } else if (b === btn && !isCorrect) {
      b.classList.add("wrong");
    }
  });

  showFeedback(isCorrect, q.correctAnswer);
}

function handleTextAnswer() {
  if (answered) return;
  answered = true;
  const q = questions[currentIndex];
  const input = document.getElementById("textAnswer");
  const value = input.value;
  const isCorrect = normalize(value) === normalize(q.correctAnswer);

  input.disabled = true;
  input.classList.add(isCorrect ? "correct" : "wrong");

  showFeedback(isCorrect, q.correctAnswer);
}

// Checks all four verb fields individually, marks each one, and only
// counts the whole question correct if every field matches.
function handleVerbCheck() {
  if (answered) return;
  answered = true;
  const q = questions[currentIndex];
  let allCorrect = true;

  q.fields.forEach((f, i) => {
    const input = document.getElementById(`verbField${i}`);
    const hint = document.getElementById(`verbHint${i}`);
    const isCorrect = normalize(input.value) === normalize(f.value);
    input.disabled = true;
    input.classList.add(isCorrect ? "correct" : "wrong");
    if (!isCorrect) {
      allCorrect = false;
      hint.textContent = `Correct: ${f.value}`;
    }
  });

  totalAnswered++;
  if (allCorrect) {
    score++;
    setScore++;
    totalCorrect++;
  }

  const feedback = document.getElementById("feedback");
  feedback.textContent = allCorrect ? "All correct!" : "Some forms were off — check the hints above.";
  feedback.className = "feedback " + (allCorrect ? "correct-text" : "wrong-text");

  const btn = document.getElementById("actionBtn");
  btn.textContent = "Next";
}

function showFeedback(isCorrect, correctAnswer) {
  totalAnswered++;
  if (isCorrect) {
    score++;
    setScore++;
    totalCorrect++;
  }
  const feedback = document.getElementById("feedback");
  feedback.textContent = isCorrect
    ? "Correct!"
    : `Not quite. Correct answer: ${correctAnswer}`;
  feedback.className = "feedback " + (isCorrect ? "correct-text" : "wrong-text");

  const btn = document.getElementById("actionBtn");
  btn.textContent = "Next";
  btn.disabled = false;
}

function nextQuestion() {
  currentIndex++;
  if (currentIndex >= questions.length) {
    snapshotAccuracy();
    renderEndScreen();
  } else if (currentIndex % QUESTIONS_PER_SET === 0) {
    snapshotAccuracy();
    renderSetCompleteScreen();
  } else {
    renderQuestion();
  }
}

function renderSetCompleteScreen() {
  const app = document.getElementById("app");
  const totalSets = Math.ceil(questions.length / QUESTIONS_PER_SET);
  const setNumber = Math.floor(currentIndex / QUESTIONS_PER_SET);
  const setStart = (setNumber - 1) * QUESTIONS_PER_SET;
  const setLength = Math.min(QUESTIONS_PER_SET, questions.length - setStart);
  const pct = Math.round((setScore / setLength) * 100);

  app.innerHTML = `
    <div class="end-screen">
      <p class="lang-tag">Set ${setNumber} of ${totalSets} complete</p>
      <div class="end-score">${setScore} / ${setLength}</div>
      <p class="end-sub">${pct}% correct on this set &nbsp;·&nbsp; ${displayedAccuracy}% overall</p>
      <button class="restart-btn" onclick="continueToNextSet()">Continue to Set ${setNumber + 1}</button>
    </div>
  `;
}

function continueToNextSet() {
  setScore = 0;
  renderQuestion();
}

function renderEndScreen() {
  const app = document.getElementById("app");
  const pct = Math.round((score / questions.length) * 100);
  app.innerHTML = `
    <div class="end-screen">
      <p class="lang-tag">Quiz complete</p>
      <div class="end-score">${score} / ${questions.length}</div>
      <p class="end-sub">${pct}% correct — ${escapeHtml(MODES[currentMode].title)}</p>
      <button class="restart-btn" onclick="startQuiz(currentMode)">Try again</button>
      <button class="secondary-btn" onclick="renderModeSelect()">Change quiz type</button>
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}
function escapeAttr(str) {
  return String(str).replace(/'/g, "\\'");
}

// Enter key drives the same action button (check, then next), and is
// ignored on the set-complete / end / mode-select screens where
// actionBtn isn't present.
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const btn = document.getElementById("actionBtn");
    if (btn && !btn.disabled) {
      e.preventDefault();
      handleActionButton();
    }
  }
});

renderModeSelect();
</script>
</body>
</html>
